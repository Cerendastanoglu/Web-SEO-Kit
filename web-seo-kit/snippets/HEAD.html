<!--
  SEO-ready <head> template
  - Edit placeholders (YOUR_*) to match your site.
  - Keep <meta charset> and <meta viewport> as the first tags in <head>.
-->

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Optional but recommended -->
<meta name="theme-color" content="#111111">
<meta name="application-name" content="YOUR_SITE_NAME">
<meta name="generator" content="Web SEO Kit">

<!-- Primary SEO -->
<title>YOUR_PAGE_TITLE</title>
<meta name="description" content="YOUR_UNIQUE_PAGE_DESCRIPTION (aim ~120-160 chars)">
<link rel="canonical" href="https://example.com/YOUR_PAGE_SLUG/">

<!-- Crawling / indexing -->
<meta name="robots" content="index,follow">
<!-- Google specific (optional) -->
<meta name="googlebot" content="index,follow">
<!-- Optional: disable sitelinks search box -->
<!-- <meta name="google" content="nositelinkssearchbox"> -->
<!-- Optional: disable translation -->
<!-- <meta name="google" content="notranslate"> -->

<!-- Hreflang (for international pages) -->
<!-- Example:
<link rel="alternate" hreflang="en" href="https://example.com/en/YOUR_PAGE_SLUG/">
<link rel="alternate" hreflang="es" href="https://example.com/es/YOUR_PAGE_SLUG/">
-->

<!-- Search Console / site verification (add what you need) -->
<!-- <meta name="google-site-verification" content="YOUR_GOOGLE_TOKEN"> -->
<!-- <meta name="msvalidate.01" content="YOUR_BING_TOKEN"> -->
<!-- <meta name="yandex-verification" content="YOUR_YANDEX_TOKEN"> -->

<!-- Open Graph (Facebook / LinkedIn previews) -->
<meta property="og:title" content="YOUR_PAGE_TITLE">
<meta property="og:type" content="website">
<meta property="og:url" content="https://example.com/YOUR_PAGE_SLUG/">
<meta property="og:image" content="https://example.com/path/to/og-image.jpg">
<meta property="og:image:alt" content="Short alt text describing the OG image">
<meta property="og:description" content="YOUR_UNIQUE_PAGE_DESCRIPTION">
<meta property="og:site_name" content="YOUR_SITE_NAME">
<meta property="og:locale" content="en_US">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="YOUR_PAGE_TITLE">
<meta name="twitter:description" content="YOUR_UNIQUE_PAGE_DESCRIPTION">
<meta name="twitter:url" content="https://example.com/YOUR_PAGE_SLUG/">
<meta name="twitter:image" content="https://example.com/path/to/og-image.jpg">
<!-- Optional -->
<!-- <meta name="twitter:site" content="@YOUR_TWITTER_HANDLE"> -->
<!-- <meta name="twitter:creator" content="@YOUR_TWITTER_HANDLE"> -->

<!-- Icons -->
<link rel="icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<!-- Safari pinned tab icon (optional) -->
<!-- <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#111111"> -->

<!-- Structured data (example placeholders) -->
<!--
  Replace @type and fields with schema relevant to the page:
  - Organization / WebSite
  - Article / BlogPosting
  - Product
  - FAQPage
-->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "YOUR_SITE_NAME",
  "url": "https://example.com/",
  "logo": "https://example.com/path/to/logo.png",
  "sameAs": [
    "https://twitter.com/YOUR_TWITTER",
    "https://www.linkedin.com/company/YOUR_LINKEDIN"
  ]
}
</script>

<!--
  Keep validation in mind:
  - Use valid HTML5 (doctype + proper tags in your full document)
  - Use consistent canonical + hreflang
  - Make sure OG/Twitter image URLs are reachable publicly
-->
