<!doctype html>
<html lang="en">
  <head>
    <!-- Paste the contents of `web-seo-kit/snippets/HEAD.html` here -->
    <!--
      Then set:
      - YOUR_PAGE_TITLE
      - YOUR_UNIQUE_PAGE_DESCRIPTION
      - canonical href
      - og/twitter image URLs
    -->
  </head>

  <body>
    <a href="#main" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;">
      Skip to content
    </a>

    <header>
      <nav aria-label="Primary">
        <a href="/">Home</a>
        <a href="/pricing/">Pricing</a>
        <a href="/blog/">Blog</a>
      </nav>
    </header>

    <main id="main">
      <h1>Your Page Title (H1)</h1>

      <!-- Use H2/H3 in logical hierarchy -->
      <h2>Section heading</h2>
      <p>Write unique content that satisfies search intent.</p>

      <h2>Another section</h2>
      <img
        src="/images/example.jpg"
        alt="Short descriptive alt text describing the image"
        width="800"
        height="450"
        loading="lazy"
      />

      <!-- Example internal link (descriptive anchor text) -->
      <p>
        Read more in
        <a href="/blog/example/">this related article</a>.
      </p>
    </main>

    <footer>
      <p>&copy; YOUR_YEAR YOUR_SITE_NAME</p>
    </footer>
  </body>
</html>
